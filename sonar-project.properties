# SonarCloud configuration for JASON-OS
# Consumed by .github/workflows/sonarcloud.yml via the SonarSource action.
# Per Layer 0+ item 0g (D22, D23, MI-4).

sonar.projectKey=jasonmichaelbell78-creator_JASON-OS
sonar.organization=jasonmichaelbell78-creator

# Source configuration
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Exclusions
# - .research/** and .planning/** are documentation-heavy project artifacts
#   (brainstorm, research output, deep-plan state) — not source code to scan.
# - node_modules/** is vendor deps (husky only at Foundation time).
# - .husky/_/** is husky's auto-generated runner shims — not our code.
sonar.exclusions=.research/**,.planning/**,node_modules/**,.husky/_/**

# JASON-OS has no test dirs yet (test framework decision is post-Foundation;
# add `sonar.tests` + test-inclusion patterns when tests land).
