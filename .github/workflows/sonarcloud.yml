# SonarCloud analysis workflow for JASON-OS
# Triggered on push/PR to main, or manual dispatch.
# Config lives in sonar-project.properties at repo root.
# Per Layer 0+ item 0g (D22, D23, MI-4).

name: SonarCloud analysis

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read # required for actions/checkout
  pull-requests: write # allows SonarCloud to decorate PRs with analysis results
  security-events: write # required to publish results to GitHub Code Scanning (if enabled)

jobs:
  Analysis:
    # Skip analysis for fork PRs (SONAR_TOKEN not available to forks)
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # Full history for accurate blame + PR decoration

      - name: Analyze with SonarCloud
        # sonarqube-scan-action is the drop-in replacement for the deprecated
        # sonarcloud-github-action. SHA-pinned per SonarCloud S7637 hotspot
        # advisory + general supply-chain hygiene (matches actions/checkout
        # pinning above). Update SHA when bumping tag.
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          GITHUB_TOKEN: ${{ github.token }} # Required for PR decoration
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: .
          # Scanner args not needed — reads from sonar-project.properties
