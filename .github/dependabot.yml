# Dependabot configuration
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # npm entry intentionally omitted until JASON-OS has a package.json.
  # Re-add when stack is chosen.

  # GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      # Group all GitHub Actions updates to reduce PR noise
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
    labels:
      - "ci"
    commit-message:
      prefix: "chore(ci)"
